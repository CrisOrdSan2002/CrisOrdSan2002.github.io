<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower Mariel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            --pink-soft: #fdf0f2;
            --pink-accent: #f4a7b9;
            --purple-accent: #a890c0;
            --text-dark: #5a5a5a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pink-soft);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        #magic-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99;
        }
        .particle { position: absolute; user-select: none; will-change: transform; }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, var(--pink-soft) 100%);
        }

        .hero-name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(4.5rem, 18vw, 8rem);
            color: var(--purple-accent);
            line-height: 1.1;
            margin: 15px 0;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .countdown-item {
            background: white;
            padding: 10px;
            border-radius: 12px;
            min-width: 65px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .countdown-number { display: block; font-size: 1.5rem; font-weight: 700; color: var(--pink-accent); }
        .countdown-label { font-size: 0.6rem; text-transform: uppercase; }

        .giraffe-main {
            width: 280px;
            max-width: 70%;
            animation: floating 3s ease-in-out infinite;
            z-index: 5;
            margin-top: 20px;
        }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .section { padding: 40px 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(244, 167, 185, 0.15);
            margin-bottom: 30px;
        }

        /* Contenedor del mapa ajustado */
        .map-wrapper {
            border-radius: 30px;
            overflow: hidden;
            height: 350px;
            margin: 20px 0;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .map-wrapper iframe {
            width: 100% !important;
            height: 100% !important;
            border: 0 !important;
        }

        .btn {
            display: inline-block;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin: 10px auto;
            max-width: 300px;
            transition: 0.3s;
        }
        .btn-wa { background: #25D366; color: white; }
        .btn-gift { background: #e6007e; color: white; }

        #music-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            background: var(--purple-accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #music-icon { width: 24px; height: 24px; fill: white; }

        footer { font-family: 'Great Vibes', cursive; font-size: 2rem; padding: 40px; color: var(--purple-accent); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="magic-container"></div>

    <audio id="bg-music" autoplay loop>
        <source src="once_upon_a_dream.mp3" type="audio/mpeg">
    </audio>

    <div id="music-control" onclick="toggleMusic()">
        <svg id="music-icon" viewBox="0 0 24 24">
            <path id="icon-path" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
    </div>

    <section class="hero">
        <div class="reveal">
            <h2 style="letter-spacing: 5px; color: var(--pink-accent); font-size: 1.2rem;">BABY SHOWER</h2>
            <h1 class="hero-name">Mariel</h1>
            <div class="countdown-container">
                <div class="countdown-item"><span id="days" class="countdown-number">00</span><span class="countdown-label">Días</span></div>
                <div class="countdown-item"><span id="hours" class="countdown-number">00</span><span class="countdown-label">Hrs</span></div>
                <div class="countdown-item"><span id="mins" class="countdown-number">00</span><span class="countdown-label">Min</span></div>
                <div class="countdown-item"><span id="secs" class="countdown-number">00</span><span class="countdown-label">Seg</span></div>
            </div>
        </div>
        <img src="https://i.postimg.cc/SNb0wS0q/JIRAFITA.png" alt="Jirafita" class="giraffe-main">
    </section>

    <section class="section">
        <div class="info-card reveal">
            <h3>CUÁNDO Y DÓNDE</h3>
            <p>SÁBADO 02 DE MAYO, 2026 | 16:00 HRS</p>
            <p><strong>Salón de Eventos Samsara</strong></p>
            <p style="font-size: 0.9rem; opacity: 0.8;">Av. Cuauhtemoc #115, Col. Tepeyac, Poza Rica.</p>
        </div>

        <div class="map-wrapper reveal">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3736.439365316127!2d-97.43607332475696!3d20.529196480998017!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85da41d32e2fd45b%3A0x646179e226f67a39!2sSamsara%20Sal%C3%B3n%20de%20Eventos!5e1!3m2!1ses!2sus!4v1775242594237!5m2!1ses!2sus" width="800" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="info-card reveal">
            <h3>MESA DE REGALOS LIVERPOOL</h3>
            <span style="font-size: 2rem; letter-spacing: 5px; color: var(--purple-accent); font-weight: 700; display: block; margin: 15px 0;">51864550</span>
            <a href="https://mesaderegalos.liverpool.com.mx/milistaderegalos/51864550" target="_blank" class="btn btn-gift">Ver Mesa</a>
        </div>

        <div class="reveal">
            <a href="https://wa.me/5217711035377?text=Confirmo%20asistencia%20Mariel%20🌸" class="btn btn-wa" target="_blank">Confirmar por WhatsApp</a>
        </div>

        <footer>¡Te esperamos!</footer>
    </section>

    <script>
        const music = document.getElementById('bg-music');
        const iconPath = document.getElementById('icon-path');
        let isPlaying = true;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                iconPath.setAttribute('d', 'M8 5v14l11-7z');
            } else {
                music.play().catch(e => console.log("Autoplay bloqueado"));
                iconPath.setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
            }
            isPlaying = !isPlaying;
        }

        // Respaldo para iniciar audio tras la primera interacción del usuario
        document.body.addEventListener('click', () => {
            if (music.paused && isPlaying) music.play().catch(() => {});
        }, { once: true });

        const targetDate = new Date("May 2, 2026 16:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = targetDate - now;
            document.getElementById("days").innerText = Math.max(0, Math.floor(d / 86400000));
            document.getElementById("hours").innerText = Math.max(0, Math.floor((d % 86400000) / 3600000));
            document.getElementById("mins").innerText = Math.max(0, Math.floor((d % 3600000) / 60000));
            document.getElementById("secs").innerText = Math.max(0, Math.floor((d % 60000) / 1000));
        }, 1000);

        const container = document.getElementById('magic-container');
        const items = ['🌸', '🦋', '✨', '💮'];
        function createP() {
            const p = document.createElement('div');
            p.innerHTML = items[Math.floor(Math.random() * items.length)];
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '-50px';
            p.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(p);
            p.animate([{ transform: 'translateY(0) rotate(0deg)', opacity: 0 }, { opacity: 1, offset: 0.1 }, { transform: `translate(${Math.random()*100-50}px, 105vh) rotate(720deg)`, opacity: 0 }], { duration: Math.random() * 6000 + 4000, iterations: Infinity });
        }
        for(let i=0; i<15; i++) createP();
        ScrollReveal().reveal('.reveal', { distance: '30px', duration: 1000, interval: 200, origin: 'bottom' });
    </script>
</body>
</html>
